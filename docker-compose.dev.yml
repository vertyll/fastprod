services:
  db:
    image: postgres:17-alpine
    container_name: fastprod-postgre-sql
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fastprod
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - fastprod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  test-db:
    image: postgres:17-alpine
    container_name: fastprod-postgre-sql-test
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fastprod_test
    networks:
      - fastprod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  mail-dev:
    image: maildev/maildev:latest
    container_name: fastprod-mail-dev
    restart: always
    ports:
      - "1025:1025"
      - "1080:1080"
    networks:
      - fastprod

networks:
  fastprod:
    driver: bridge

volumes:
  postgres-data: